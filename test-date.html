<!DOCTYPE html>
<html>
<head>
    <title>日期验证测试</title>
</head>
<body>
    <h1>测试项目创建</h1>
    <form id="testForm">
        <input type="text" id="title" placeholder="项目标题" value="测试项目"><br><br>
        <input type="text" id="description" placeholder="项目简介" value="测试描述"><br><br>
        <textarea id="content" placeholder="项目详情">测试内容详情</textarea><br><br>
        <input type="number" id="targetAmount" placeholder="目标金额" value="1000"><br><br>
        <input type="date" id="endDate" value="2025-10-10"><br><br>
        <select id="urgency">
            <option value="normal">普通</option>
            <option value="urgent">紧急</option>
        </select><br><br>
        <button type="submit">创建项目</button>
    </form>
    <div id="result"></div>

    <script>
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                content: document.getElementById('content').value,
                targetAmount: document.getElementById('targetAmount').value,
                endDate: document.getElementById('endDate').value,
                urgency: document.getElementById('urgency').value
            };

            try {
                const response = await fetch('/api/projects', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>响应状态: ${response.status}</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>错误:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        });
    </script>
</body>
</html>
